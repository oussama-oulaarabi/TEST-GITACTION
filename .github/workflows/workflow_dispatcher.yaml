name: workflow-dispatcher
on:
  workflow_dispatch:
    inputs:
      input1:
        description: 'Input 1'
        required: true
        default: jenkins
        type: choice
        options:
          - docker
          - jenkins
          - kubernetes
      input2:
        description: 'Input 2'
        required: false
        default: true
        type: boolean
      input3:
        description: 'Input 3'
        required: true
        default: oussama
        type: string
jobs:
  example-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print Inputs
        run: |
          echo "Input 1: ${{ github.event.inputs.input1 }}"
          echo "Input 2: ${{ github.event.inputs.input2 }}"
          echo "Input 3: ${{ github.event.inputs.input3 }}"
              