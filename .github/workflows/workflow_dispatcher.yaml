name: workflow-dispatcher

on:
  workflow_dispatch:
    inputs:
      input1:
        description: 'Input 1'
        required: true
        default: jenkins
        type: choice
        options:
          - docker
          - jenkins
          - kubernetes

      input2:
        description: 'Input 2'
        required: false
        default: true
        type: boolean

      input3:
        description: 'Input 3'
        required: true
        default: oussama
        type: string

      input4:
        description: 'Choose environment'
        required: true
        type: environment

jobs:
  example-job:
    runs-on: ubuntu-latest
    environment: ${{ inputs.input4 }}

    steps:
      - name: Print selected inputs
        run: |
          echo "Input 1: ${{ inputs.input1 }}"
          echo "Input 2: ${{ inputs.input2 }}"
          echo "Input 3: ${{ inputs.input3 }}"
          echo "Selected environment: ${{ inputs.input4 }}"

      - name: Print environment variables
        run: |
          echo "FIRST_NAME: ${{ vars.first_name }}"
          echo "LAST_NAME: ${{ vars.last_name }}"
          echo "AGE: ${{ vars.age }}"